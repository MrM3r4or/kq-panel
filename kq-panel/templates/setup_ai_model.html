<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدل هوش مصنوعی | kQ Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .setup-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 35px;
            width: 550px;
            max-width: 95%;
            position: relative;
            z-index: 2;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5),
                        inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideIn 0.6s ease-out;
            text-align: center;
            color: white;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4); }
            50% { box-shadow: 0 15px 40px rgba(240, 147, 251, 0.8); }
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #f093fb;
            font-size: 18px;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-family: 'Vazirmatn', Tahoma;
            transition: all 0.4s;
            outline: none;
        }

        input:focus {
            border-color: #f093fb;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 30px rgba(240, 147, 251, 0.3);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.4s;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        .hint {
            color: rgba(255,255,255,0.5);
            font-size: 0.75rem;
            margin-top: 8px;
            text-align: right;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }

        .step-dot.active {
            background: #f093fb;
            box-shadow: 0 0 15px #f093fb;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="setup-container">
        <div class="icon-container">
            <div class="icon-circle">🧠</div>
        </div>
        <h2>مدل هوش مصنوعی</h2>
        <p class="subtitle">مدل مورد نظر خود را وارد کنید</p>

        <form method="POST">
            <div class="input-group">
                <i>🤖</i>
                <input type="text" name="ai_model" placeholder="مثال: alibaba/happyhorse-1.1" required autocomplete="off">
            </div>
            <div class="hint">📌 فرمت: provider/model (مثلاً openai/gpt-4)</div>
            <button type="submit" class="btn-submit">ادامه ➜</button>
        </form>

        <div class="step-indicator">
            <span class="step-dot"></span>
            <span class="step-dot"></span>
            <span class="step-dot active"></span>
        </div>
    </div>

    <script>
        const pc = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = Math.random() * 10 + 5 + 'px';
            p.style.animationDuration = Math.random() * 10 + 10 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            pc.appendChild(p);
        }
    </script>
</body>
</html>
