<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتخاب نوع ربات</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow-x: hidden;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        /* ذرات پس‌زمینه */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .setup-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: clamp(30px, 5vw, 50px);
            width: min(800px, 95%);
            position: relative;
            z-index: 2;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5),
                        inset 0 1px 0 rgba(255,255,255,0.1);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-container {
            text-align: center;
            margin-bottom: 25px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 25px rgba(240, 147, 251, 0.4); }
            50% { box-shadow: 0 15px 40px rgba(240, 147, 251, 0.8); }
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 8px;
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 700;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .type-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            justify-content: center;
        }

        .type-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .type-card:hover {
            border-color: #f093fb;
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
        }

        .type-card.selected {
            border-color: #f093fb;
            background: rgba(240, 147, 251, 0.2);
        }

        .type-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .type-card.disabled:hover {
            transform: none;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .type-icon {
            font-size: 45px;
            line-height: 1;
        }

        .type-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .type-desc {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .type-notice {
            font-size: 0.75rem;
            color: #f59e0b;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(240, 147, 251, 0.5);
        }

        .btn-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }

        .step-dot.active {
            background: #f093fb;
            box-shadow: 0 0 15px #f093fb;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="setup-container">
        <div class="icon-container">
            <div class="icon-circle">🤖</div>
        </div>
        <h2>نوع ربات خود را انتخاب کنید</h2>
        <p class="subtitle">یکی از گزینه‌های زیر را برگزینید</p>

        <form method="POST" id="typeForm">
            <input type="hidden" name="bot_type" id="botTypeInput" value="">
            <div class="type-grid">
                <div class="type-card" data-type="uploader" onclick="selectType('uploader', this)">
                    <div class="type-icon">📁</div>
                    <div class="type-name">بات آپلودر</div>
                    <div class="type-desc">آپلود فایل و دریافت لینک اختصاصی</div>
                </div>
                <div class="type-card disabled" data-type="anonymous">
                    <div class="type-icon">👻</div>
                    <div class="type-name">پیام ناشناس</div>
                    <div class="type-desc">ارسال پیام مخفی</div>
                    <div class="type-notice">⏳ به‌زودی</div>
                </div>
                <div class="type-card disabled" data-type="buy_sell">
                    <div class="type-icon">🛒</div>
                    <div class="type-name">خرید و فروش</div>
                    <div class="type-desc">مدیریت محصولات و سفارشات</div>
                    <div class="type-notice">⏳ به‌زودی</div>
                </div>
                <div class="type-card" data-type="assistant" onclick="selectType('assistant', this)">
                    <div class="type-icon">🧠</div>
                    <div class="type-name">دستیار هوش مصنوعی</div>
                    <div class="type-desc">دستیار شخصی با هوش مصنوعی</div>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn" disabled>ادامه ➜</button>
        </form>

        <div class="step-indicator">
            <span class="step-dot"></span>
            <span class="step-dot active"></span>
            <span class="step-dot"></span>
        </div>
    </div>

    <script>
        // ذرات پس‌زمینه
        const pc = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.width = p.style.height = Math.random() * 10 + 5 + 'px';
            p.style.animationDuration = Math.random() * 10 + 10 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            pc.appendChild(p);
        }

        function selectType(type, el) {
            if (el.classList.contains('disabled')) {
                alert('⚠️ این نوع ربات فعلاً در این نسخه در دسترس نیست.');
                return;
            }
            document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('botTypeInput').value = type;
            document.getElementById('submitBtn').disabled = false;
        }
    </script>
</body>
</html>
