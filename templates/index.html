<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kQ Panel | مدیریت ربات تلگرام</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="light-mode">
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">🤖</div>
                <div class="brand-info">
                    <h3>kQ Panel</h3>
                    <span>مدیریت حرفه‌ای</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="status">
                    <i class="fas fa-chart-line"></i><span>وضعیت ربات</span><span class="badge pulse"></span>
                </a>
                <a href="#" class="nav-item" data-page="messages">
                    <i class="fas fa-comment-dots"></i><span>تنظیمات پیام‌ها</span>
                </a>
                <a href="#" class="nav-item" data-page="files">
                    <i class="fas fa-folder-open"></i><span>مدیریت فایل‌ها</span>
                </a>
                <a href="#" class="nav-item" data-page="users">
                    <i class="fas fa-users"></i><span>کاربران</span>
                </a>
                <a href="#" class="nav-item" data-page="buttons">
                    <i class="fas fa-th-large"></i><span>مدیریت دکمه‌ها</span>
                </a>
                <a href="#" class="nav-item" data-page="force_join">
                    <i class="fas fa-link"></i><span>جوین اجباری</span>
                </a>
                <a href="#" class="nav-item" data-page="bans">
                    <i class="fas fa-ban"></i><span>مدیریت بن</span>
                </a>
                <a href="#" class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i><span>تنظیمات</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="copyright-box">
                    <div class="copyright-icon">⚡</div>
                    <div class="copyright-text">
                        <span>© 2026 - 2027</span>
                        <span>Dev by <strong>KhandaQh</strong></span>
                        <span class="version-badge">Version 1 (Beta)</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h2 id="pageTitle">وضعیت ربات</h2>
                <div class="header-actions">
                    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
                </div>
            </header>
            <div class="content-area" id="dynamicContent"></div>
        </main>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
